<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paper MC: Forge Launcher</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <!-- Tabs -->

  <div class="tabs">
    <div class="tab active" onclick="switchTab('launcher', this)">Launcher</div>
    <div class="tab" onclick="switchTab('mods', this)">Mods</div>
  </div>

  <!-- Launcher Panel -->

  <div id="launcher" class="panel active">
    <div class="launcher">

  <label for="version">Select a version:</label>
  <select id="version">
    <option value="latest-beta" selected>Latest - Beta (1.0)</option>
  </select>

  <button onclick="openSelectedVersion()">Launch Game</button>

</div>

  </div>

  <!-- Mods Panel -->

  <div id="mods" class="panel">

     <!-- Header -->
  <div class="mods-header">
    <h2>Mods</h2>
    <button class="studio-btn" onclick="openStudio()">Open Forge Studio</button>
  </div>
    
    <div class="mods">

  <div class="mod-card">
    <div class="mod-title">Example Mod</div>
    <div class="mod-desc">Adds cool features</div>
    <div class="mod-btn" onclick="launchMod('latest-beta','https://petbarik.github.io/papermc-forge/mods/cheese.foj')">
      Install & Launch
    </div>
  </div>

</div>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
