<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paper MC: Forge Launcher</title>
</head>
<body>
    <label for="version">Select a version:</label>
        <select id="version" name="version">
        <option value="1.0">1.0 - Beta</option>
        <option value="latest-beta" selected>Latest - Beta</option>
    </select>
    <button onclick="openSelectedVersion()">Launch Game</button>
</body>
</html>

<script>
function openSelectedVersion() {
  const selector = document.getElementById('version');
  const value = selector.value;
  const url = "https://petbarik.github.io/papermc-forge/" + value;
  
  window.open(url, '_blank');
}
</script>
